name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-type-check:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.9"
        cache: "pip"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff mypy pytest pytest-asyncio
        # If there are other requirements, install them here
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint with Ruff
      run: |
        # Run ruff to check for style errors and formatting issues.
        # This will fail the build if Ruff finds any errors.
        ruff check .

    - name: Type check with mypy
      run: |
        # Run mypy for static type checking.
        mypy signal_hydrator

    - name: Run tests (optional but recommended)
      run: |
        pytest
